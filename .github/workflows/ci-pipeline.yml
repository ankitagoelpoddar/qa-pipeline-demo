# .github/workflows/ci-pipeline.yml
# GitHub Actions pipeline — same concepts as Jenkins and Azure DevOps

name: QA Pipeline - Run Tests

on:                          # ← "when does this pipeline trigger?"
  push:
    branches: [ main ]       # run when code is pushed to main
  pull_request:
    branches: [ main ]       # also run on pull requests

jobs:

  unit-tests:                # ← Job 1 (like a stage in Jenkins)
    name: Unit Tests
    runs-on: ubuntu-latest   # ← GitHub's free cloud machine (like Jenkins agent)

    steps:                   # ← steps inside this job

    - name: Checkout code
      uses: actions/checkout@v3       # built-in action to pull your code

    - name: Set up Python
      uses: actions/setup-python@v4  # built-in action — like Azure's UsePythonVersion
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run unit tests
      run: |
        mkdir -p test-reports
        pytest tests/test_unit.py \
          --junitxml=test-reports/unit-results.xml \
          -v

    - name: Publish unit test results
      uses: actions/upload-artifact@v3   # saves your XML report
      if: always()                       # ← same as post { always } in Jenkins!
      with:
        name: unit-test-results
        path: test-reports/unit-results.xml

  api-tests:                 # ← Job 2 — runs IN PARALLEL with unit-tests!
    name: API Tests
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run API tests
      run: |
        mkdir -p test-reports
        pytest tests/test_api.py \
          --junitxml=test-reports/api-results.xml \
          -v

    - name: Publish API test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: api-test-results
        path: test-reports/api-results.xml

  deploy:                    # ← Job 3 — only runs after BOTH test jobs pass
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests]   # ← same as dependsOn in Azure DevOps!

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy
      run: |
        echo "✅ All tests passed!"
        echo "🚀 Deploying to staging..."
        echo "This is where your real deploy command would go"
